services:
  rabbitmq:
    image: rabbitmq:4.0.7-management
    ports:
      - "15672:15672"
    volumes:
      - "~/.billy/rabbitmq:/var/lib/rabbitmq"
      - "./rabbitmq/rabbitmq.config:/etc/rabbitmq/rabbitmq.config"
      - "./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json"
    networks:
      - billy_network
    healthcheck:
      test: [ CMD, rabbitmqctl, status ]
      interval: 30s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:17.4
    environment:
      POSTGRES_USER: billy
      POSTGRES_PASSWORD: billy
      POSTGRES_DB: billy
    networks:
      - billy_network
    volumes:
      - "~/.billy/postgres:/var/lib/postgresql/data"
  
  billy:
    build:
      context: .
      dockerfile: Dockerfile.billy
    env_file: .env
    networks:
      - billy_network
    depends_on:
      - postgres
      - rabbitmq
    restart: unless-stopped
    volumes:
      - ".:/app"

networks:
  billy_network:
    driver: bridge
